name: 장중 준실시간 배치

on:
  schedule:
    # 미 장중(9:30AM–4PM ET = EDT 기준 13:30–20:00 UTC) 15분 주기
    # GitHub Actions cron은 분 단위 지정. 5분 간격으로 여러 cron 선언.
    - cron: "0,15,30,45 13 * * 1-5"
    - cron: "0,15,30,45 14 * * 1-5"
    - cron: "0,15,30,45 15 * * 1-5"
    - cron: "0,15,30,45 16 * * 1-5"
    - cron: "0,15,30,45 17 * * 1-5"
    - cron: "0,15,30,45 18 * * 1-5"
    - cron: "0,15,30,45 19 * * 1-5"
    - cron: "0,15 20 * * 1-5"
  workflow_dispatch:

jobs:
  live:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: 준실시간 가격 수집
        run: python scripts/fetch_live.py

      - name: live.json 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/public/data/live.json
          git diff --staged --quiet || (git commit -m "data: live $(date -u '+%H:%M UTC')" && git pull --rebase origin main && git push)
