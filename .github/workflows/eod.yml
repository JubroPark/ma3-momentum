name: EOD 배치

on:
  schedule:
    # 미 장마감(4PM ET) 후: EDT=21:30 UTC, EST=22:30 UTC → 22:00으로 커버
    - cron: "0 22 * * 1-5"
  workflow_dispatch: # 수동 실행 가능

jobs:
  eod:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: 의존성 설치
        run: pip install -r scripts/requirements.txt

      - name: FRED 데이터 수집
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_fred.py

      - name: EOD 시장 데이터 수집
        run: python scripts/fetch_eod.py

      - name: 모멘텀 종목 지표 수집
        run: python scripts/fetch_momentum.py

      - name: JSON 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/public/data/
          git restore --staged app/public/data/push_subscriptions.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "data: EOD 배치 $(date -u '+%Y-%m-%d')" && git pull --rebase origin main && git push)

      - name: Web Push 알림 발송
        env:
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          GITHUB_PAT: ${{ secrets.GH_PAT }}
        run: python scripts/send_push.py
